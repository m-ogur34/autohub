version: '3.8'

# AutoHub - Docker Compose Konfigürasyonu
# Tüm servisler tek komutla başlatılır: docker-compose up -d
# Servisler birbirleriyle 'autohub-network' üzerinden iletişim kurar

services:

  # =====================================================
  # PostgreSQL - Ana Veritabanı
  # =====================================================
  postgres:
    image: postgres:15-alpine               # Alpine: Küçük boyutlu Linux image
    container_name: autohub-postgres
    restart: unless-stopped                 # Container çöktüğünde otomatik yeniden başlat
    environment:
      POSTGRES_DB: autohub_db              # Veritabanı adı
      POSTGRES_USER: autohub_user          # Kullanıcı adı
      POSTGRES_PASSWORD: autohub_pass      # Şifre (üretimde .env dosyasından alınmalı)
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"                        # Host:Container port eşleştirme
    volumes:
      # Veri kalıcılığı için named volume - container silinse bile veri kalır
      - postgres_data:/var/lib/postgresql/data
    networks:
      - autohub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autohub_user -d autohub_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # Redis - Önbellek Servisi
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: autohub-redis
    restart: unless-stopped
    command: redis-server --requirepass redis_password --maxmemory 256mb --maxmemory-policy allkeys-lru
    # maxmemory: Maksimum bellek kullanımı
    # maxmemory-policy: Bellek dolduğunda en az kullanılan anahtarları sil (LRU)
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data                   # Redis AOF/RDB dosyaları için kalıcı depolama
    networks:
      - autohub-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # Apache Zookeeper - Kafka için gerekli koordinasyon servisi
  # =====================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: autohub-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - autohub-network

  # =====================================================
  # Apache Kafka - Mesajlaşma Platformu
  # =====================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: autohub-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper                          # Kafka Zookeeper'a bağımlı
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'  # Topic'ler otomatik oluşturulsun
    networks:
      - autohub-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =====================================================
  # Elasticsearch - Arama Motoru
  # =====================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: autohub-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node        # Tek node modunda çalıştır (geliştirme)
      - xpack.security.enabled=false      # Güvenliği devre dışı bırak (geliştirme)
      - ES_JAVA_OPTS=-Xms512m -Xmx512m   # JVM heap boyutu: 512MB min-max
    ports:
      - "9200:9200"                       # HTTP API portu
      - "9300:9300"                       # Transport portu
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - autohub-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =====================================================
  # Apache ActiveMQ - Klasik Mesaj Kuyruğu
  # =====================================================
  activemq:
    image: apache/activemq-artemis:2.31.2
    container_name: autohub-activemq
    restart: unless-stopped
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: admin
    ports:
      - "61616:61616"                     # AMQP/TCP protokol portu
      - "8161:8161"                       # Web yönetim konsolu
    networks:
      - autohub-network

  # =====================================================
  # HashiCorp Consul - Servis Keşfi
  # =====================================================
  consul:
    image: consul:1.16
    container_name: autohub-consul
    restart: unless-stopped
    command: agent -dev -bind=0.0.0.0 -client=0.0.0.0
    ports:
      - "8500:8500"                       # Consul web UI ve API
    networks:
      - autohub-network

  # =====================================================
  # Zipkin - Dağıtık İzleme
  # =====================================================
  zipkin:
    image: openzipkin/zipkin:3
    container_name: autohub-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"                       # Zipkin web UI ve API
    networks:
      - autohub-network

  # =====================================================
  # Prometheus - Metrik Toplama
  # =====================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: autohub-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml  # Konfigürasyon
      - prometheus_data:/prometheus                                  # Metrik verileri
    ports:
      - "9090:9090"                       # Prometheus web UI
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'  # 15 gün veri saklama
    networks:
      - autohub-network

  # =====================================================
  # Grafana - Metrik Görselleştirme
  # =====================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: autohub-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false       # Yeni kullanıcı kaydını kapat
    ports:
      - "3000:3000"                       # Grafana web UI
    volumes:
      - grafana_data:/var/lib/grafana     # Dashboard ve eklenti verileri
    networks:
      - autohub-network

  # =====================================================
  # AutoHub Backend - Spring Boot Uygulaması
  # =====================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autohub-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy        # PostgreSQL hazır olana kadar bekle
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_started
    environment:
      # Veritabanı bağlantı bilgileri
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: autohub_db
      DB_USERNAME: autohub_user
      DB_PASSWORD: autohub_pass
      # Redis bağlantısı
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password
      # Kafka bağlantısı
      KAFKA_SERVERS: kafka:29092
      # Elasticsearch bağlantısı
      ES_URI: http://elasticsearch:9200
      # ActiveMQ bağlantısı
      AMQ_URL: tcp://activemq:61616
      # Consul servis keşfi
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      # Zipkin izleme
      ZIPKIN_URL: http://zipkin:9411
      # JWT gizli anahtar - üretimde güvenli bir değer kullanın
      JWT_SECRET: YXV0b2h1Yi1zdXBlci1zZWNyZXQta2V5LW1pbmltdW0tMjU2LWJpdC1sZW5ndGgtZm9yLXNlY3VyaXR5
      # CORS ayarı - Angular frontend
      CORS_ORIGINS: http://localhost:4200
    ports:
      - "8080:8080"
    networks:
      - autohub-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 3

  # =====================================================
  # AutoHub Frontend - Angular Uygulaması
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autohub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"                           # HTTP port
      - "443:443"                         # HTTPS port (sertifika gerekir)
    networks:
      - autohub-network

# =====================================================
# Kalıcı Veri Hacimleri (Named Volumes)
# Container silinse bile veriler korunur
# =====================================================
volumes:
  postgres_data:        # PostgreSQL veritabanı dosyaları
  redis_data:           # Redis önbellek verileri
  elasticsearch_data:   # Elasticsearch indeksleri
  prometheus_data:      # Prometheus metrik verileri
  grafana_data:         # Grafana dashboard verileri

# =====================================================
# Ağ Konfigürasyonu
# Tüm servisler aynı ağda - birbirleriyle iletişim kurabilir
# =====================================================
networks:
  autohub-network:
    driver: bridge       # Varsayılan Docker ağ sürücüsü
    ipam:
      config:
        - subnet: 172.20.0.0/16  # Özel subnet - IP çakışmalarını önler
