# Nginx Konfigürasyonu - Angular SPA Desteği
# Angular Router, HTML5 History API kullanır
# Tüm bilinmeyen path'ler index.html'e yönlendirilmeli

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip sıkıştırma - yanıt boyutunu azaltır
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # Angular SPA için URL yönlendirme
    # Dosya yoksa Angular index.html'e yönlendir (Router devralır)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik dosyalar için uzun cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
}
