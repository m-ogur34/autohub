<!-- AutoHub Kök Bileşen Template -->
<!-- Tüm sayfaların kapsayıcısı - router-outlet ile sayfa içeriği değişir -->

<!-- Yükleme Spinner'ı - navigasyon sırasında gösterilir -->
<mat-progress-spinner
  *ngIf="isLoading"
  class="global-spinner"
  mode="indeterminate"
  diameter="50">
</mat-progress-spinner>

<!-- Ana Uygulama Kapsayıcısı -->
<div class="app-container">
  <!-- Giriş yapılmışsa navigasyon menüsü göster -->
  <ng-container *ngIf="authService.isLoggedIn()">
    <!-- Üst menü çubuğu -->
    <mat-toolbar color="primary" class="app-toolbar">
      <span class="app-title">🚗 AutoHub</span>
      <span class="toolbar-spacer"></span>

      <!-- Navigasyon linkleri -->
      <button mat-button routerLink="/dashboard">Dashboard</button>
      <button mat-button routerLink="/vehicles">Araçlar</button>
      <button mat-button routerLink="/customers">Müşteriler</button>
      <button mat-button routerLink="/transactions">İşlemler</button>

      <!-- Kullanıcı menüsü -->
      <button mat-icon-button [matMenuTriggerFor]="userMenu">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item (click)="authService.logout()">
          <mat-icon>logout</mat-icon>
          <span>Çıkış</span>
        </button>
      </mat-menu>
    </mat-toolbar>
  </ng-container>

  <!-- Router Outlet - Aktif route bileşeni burada render edilir -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
